          ok=0; fail=0
          for p in $PAIRS; do
            id="${p%%,*}"; k="${p##*,}"
            code=$(curl -sL -A "$UA" -e "https://www.booking.com/" -o "${id}.jpg" -w "%{http_code}" "https://cf.bstatic.com/xdata/images/hotel/max1280x900/${id}.jpg?k=${k}&o=1")
            if [ "$code" = "200" ] && [ -s "${id}.jpg" ]; then
              ok=$((ok+1))
            else
              fail=$((fail+1)); echo "FAIL $id http=$code"; rm -f "${id}.jpg"
            fi
          done
          echo "downloaded=$ok failed=$fail"
          ls | wc -l
      - name: commit
        run: |
          git config user.name "asset-bot"
