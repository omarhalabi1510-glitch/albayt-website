name: fetch-assets
on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: download assets
        run: |
          set -e
          mkdir -p images
          cd images
          M=https://static.wixstatic.com/media
          S=https://static.wixstatic.com/shapes
          F=/v1/fit/w_1600,h_1600,q_80/g.jpg
          curl -sfL "$M/1fc378_8962fce1af4147f78df44e305e8855a1~mv2.png" -o logo.png
          curl -sfL "$M/1fc378_4b23d387d9c34e508cf5f7e0d02da1f1~mv2.jpg$F" -o gallery-01.jpg
          curl -sfL "$M/1fc378_92163aea51074fb6834bcd1101dc49d3~mv2.jpg$F" -o gallery-02.jpg
          curl -sfL "$M/1fc378_7977dcdfb3014bebb05c1c879e712de3~mv2.jpg$F" -o gallery-03.jpg
          curl -sfL "$M/1fc378_64342cb2d9fd4c04a64759b0635d079f~mv2.jpg$F" -o gallery-04.jpg
          curl -sfL "$M/1fc378_02767582d3b24b2da93487bbacd2c8a1~mv2.jpg$F" -o gallery-05.jpg
          curl -sfL "$M/1fc378_1e789c6251a544df967635df4b225ad5~mv2.jpg$F" -o gallery-06.jpg
          curl -sfL "$M/1fc378_0c320c26c7814eafa2d083e55d3e4671~mv2.jpeg$F" -o gallery-07.jpg
          curl -sfL "$M/1fc378_4cd1250cb74e46e7b33c31db6f31b617~mv2_d_4272_2848_s_4_2.jpg$F" -o gallery-08.jpg
          curl -sfL "$M/1fc378_a3780fa28f344d488d96d32707e639a2~mv2_d_4272_2848_s_4_2.jpg$F" -o gallery-09.jpg
          curl -sfL "$M/1fc378_5d4470f4b3454035979b75dd3c0fff1a~mv2.jpg$F" -o gallery-10.jpg
          curl -sfL "$M/1fc378_36f44a2b23bf4c5aa8520d33701ffefb~mv2_d_4272_2848_s_4_2.jpg$F" -o gallery-11.jpg
          curl -sfL "$M/1fc378_31dfa999d2cf41f89598eaa9e5d7081f~mv2.jpeg$F" -o gallery-12.jpg
          curl -sfL "$S/08d33bf98eec4e73849470f9786480a0.svg" -o icon-phone.svg
          curl -sfL "$S/357ace99ce2b41c6a0cfaa07dd102299.svg" -o icon-breakfast.svg
          curl -sfL "$S/6ed6b0551ada4788a8901cfec483f8bb.svg" -o icon-garden.svg
          curl -sfL "$S/774b453f8b684da881e2967b311265b3.svg" -o icon-lake.svg
          ls -la
      - name: commit
        run: |
          git config user.name "asset-bot"
          git config user.email "actions@github.com"
          git add images
          git diff --cached --quiet || { git commit -m "Add site images and icons (assets fetched)"; git push; }
